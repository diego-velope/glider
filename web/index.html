<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0" />
    <meta name="tv-navigation" content="true" />
    <title>Glider - Rust Edition</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body {
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: #000;
        font-family: "Orbitron", monospace;
      }
      #game-wrapper {
        position: relative;
        width: 1280px;
        height: 720px;
      }
      canvas#glcanvas {
        display: block;
        width: 1280px;
        height: 720px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        outline: none;
      }

      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #hud-score {
        position: absolute;
        top: 14px;
        left: 20px;
        font-size: 24px;
        color: #fff;
        text-shadow: 0 0 10px rgba(0, 204, 255, 0.8);
        letter-spacing: 1px;
      }

      #hud-combo {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 22px;
        color: #ffcc44;
        text-shadow: 0 0 12px rgba(255, 204, 68, 0.6);
        letter-spacing: 1px;
      }

      #hud-hi {
        position: absolute;
        top: 14px;
        right: 20px;
        font-size: 20px;
        color: #aef;
        text-shadow: 0 0 10px rgba(170, 238, 255, 0.7);
        letter-spacing: 1px;
      }

      #hud-dist {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 20px;
        color: rgba(200, 240, 255, 0.95);
        text-shadow: 0 0 10px rgba(180, 220, 255, 0.6);
        letter-spacing: 1px;
      }

      /* Full Screen UI Overlays */
      .screen {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 30;
        pointer-events: none;
        text-align: center;
        background: rgba(0, 0, 0, 0.55);
      }

      #ui-gameover {
        background: rgba(15, 0, 0, 0.7);
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <canvas id="glcanvas" tabindex="1" width="1280" height="720"></canvas>
      <div id="hud">
        <div id="hud-score">Score: 0</div>
        <div id="hud-combo">Combo x1.0</div>
        <div id="hud-hi">High Score: 0</div>
        <div id="hud-dist">Distance: 0</div>
      </div>

      <!-- ui-pause: visibility toggled by JS (screen=2), actual rendering done on canvas -->
      <div id="ui-pause" class="screen" style="background: none; pointer-events: none;"></div>

      <div id="ui-gameover" class="screen">
        <div style="font-size: 64px; color: #f44; text-shadow: 0 0 20px rgba(255, 0, 0, 0.35); margin-bottom: 18px;">
          Game Over
        </div>
        <div id="go-score" style="font-size: 36px; color: #ffcc44; text-shadow: 0 0 15px rgba(255, 204, 68, 0.5); margin-bottom: 12px;">
          Score: 0
        </div>
        <div id="go-best" style="font-size: 22px; color: #aef; text-shadow: 0 0 10px rgba(170, 238, 255, 0.5); margin-bottom: 24px;">
          Best: 0
        </div>
        <div style="font-size: 26px; color: #d9d9d9; text-shadow: 0 0 12px rgba(200, 200, 200, 0.35);">
          Press OK to Restart
        </div>
      </div>
    </div>

    <!-- TV Platform Abstraction Layer (PAL) - Load BEFORE WASM; order matters -->
    <script src="pal/namespace.js?v=1"></script>
    <script src="pal/detect-platform.js?v=1"></script>
    <script src="pal/platforms/tizen.js?v=1"></script>
    <script src="pal/platforms/webos.js?v=1"></script>
    <script src="pal/platforms/vizio.js?v=1"></script>
    <script src="pal/platforms/firetv.js?v=1"></script>
    <script src="pal/platforms/android-tv.js?v=1"></script>
    <script src="pal/platforms/browser.js?v=1"></script>
    <script src="pal/pal-core.js?v=1"></script>

    <script src="mq_js_bundle.js?v=1"></script>

    <script>
      // Game-specific JS functions for WASM bridge (matching Rust js_* names)
      window.js_save_hi = function (s) {
        localStorage.setItem("glider_hi", s.toString());
      };

      window.js_load_hi = function () {
        var score = localStorage.getItem("glider_hi");
        return score ? parseInt(score) : 0;
      };

      window.js_get_initial_game_speed = function () {
        // gameSpeed=1..10 => 10%..100%
        try {
          var params = new URLSearchParams(window.location.search);
          var raw = parseInt(params.get("gameSpeed"), 10);
          if (!Number.isFinite(raw)) return 10;
          raw = Math.max(1, Math.min(10, raw));
          return raw;
        } catch (e) {
          return 10;
        }
      };

      window.js_set_hud = function (score, combo, hi, dist) {
        var e = function (id) {
          return document.getElementById(id);
        };
        if (e("hud-score")) e("hud-score").textContent = "Score: " + score;
        if (e("hud-combo"))
          e("hud-combo").textContent = "Combo x" + combo.toFixed(1);
        if (e("hud-hi")) e("hud-hi").textContent = "Hi: " + hi;
        if (e("hud-dist")) e("hud-dist").textContent = "Dist: " + dist;
      };

      // 1 = playing, 2 = paused, 3 = game over
      window.js_set_screen = function (screen, score, hi) {
        var pauseEl = document.getElementById("ui-pause");
        var goEl = document.getElementById("ui-gameover");
        if (pauseEl) pauseEl.style.display = screen === 2 ? "flex" : "none";
        if (goEl) {
          goEl.style.display = screen === 3 ? "flex" : "none";
          if (screen === 3) {
            var scoreEl = document.getElementById("go-score");
            var bestEl = document.getElementById("go-best");
            if (scoreEl) scoreEl.textContent = "Score: " + score;
            if (bestEl) {
              if (score >= hi && hi > 0) {
                bestEl.textContent = "New Best!";
                bestEl.style.color = "#ffcc44";
              } else {
                bestEl.textContent = "Best: " + hi;
                bestEl.style.color = "#aef";
              }
            }
          }
        }
      };

      window.mq_shutdown_game = function () {
        var tryWindowClose = true;
        try {
          if (window.TV_PAL && typeof window.TV_PAL.shutdown === "function") {
            tryWindowClose = window.TV_PAL.shutdown() !== false;
          }
          if (tryWindowClose) {
            window.close();
          }
        } catch (error) {
          console.error("[Glider] platform shutdown failed:", error);
        }
      };

      // --- Audio Visibility Handler (FireTV Home Button Fix) ---
      var audioContexts = [];
      (function () {
        var OldAudioContext = window.AudioContext || window.webkitAudioContext;
        if (OldAudioContext) {
          window.AudioContext = window.webkitAudioContext = function () {
            var ctx = new OldAudioContext();
            audioContexts.push(ctx);
            return ctx;
          };
        }
      })();

      document.addEventListener("visibilitychange", function () {
        console.log("Visibility changed to: " + document.visibilityState);
        audioContexts.forEach(function (ctx) {
          if (document.visibilityState === "hidden") {
            ctx.suspend();
          } else if (document.visibilityState === "visible") {
            ctx.resume();
          }
        });
      });

      // Note: The function MUST be named 'register_plugin'
      var GliderPlugin = {
        register_plugin: function (importObject) {
          // Register game-specific functions (matching Rust extern "C" declarations)
          importObject.env.js_save_hi = window.js_save_hi;
          importObject.env.js_load_hi = window.js_load_hi;
          importObject.env.js_get_initial_game_speed = window.js_get_initial_game_speed;
          importObject.env.js_set_hud = window.js_set_hud;
          importObject.env.js_set_screen = window.js_set_screen;
          importObject.env.mq_shutdown_game = window.mq_shutdown_game;

          // TV input handlers - these will be connected to Rust functions
          // We create wrapper functions that will be attached after WASM loads
          window.mq_handle_up = function (pressed) {
            console.log("[Glider] mq_handle_up called (WASM may not be ready)");
          };
          window.mq_handle_down = function (pressed) {
            console.log("[Glider] mq_handle_down called (WASM may not be ready)");
          };
          window.mq_handle_left = function (pressed) {
            console.log("[Glider] mq_handle_left called (WASM may not be ready)");
          };
          window.mq_handle_right = function (pressed) {
            console.log("[Glider] mq_handle_right called (WASM may not be ready)");
          };
          window.mq_handle_action = function (pressed) {
            console.log("[Glider] mq_handle_action called (WASM may not be ready)");
          };
          window.mq_handle_back = function (pressed) {
            console.log("[Glider] mq_handle_back called (WASM may not be ready)");
          };

          // Store the actual Rust function references (will be updated after load)
          window.__tvRustFunctions = {};

          // Register TV input handler functions with Macroquad
          importObject.env.mq_handle_up = function (pressed) {
            if (window.__tvRustFunctions.up) {
              window.__tvRustFunctions.up(pressed);
            }
          };
          importObject.env.mq_handle_down = function (pressed) {
            if (window.__tvRustFunctions.down) {
              window.__tvRustFunctions.down(pressed);
            }
          };
          importObject.env.mq_handle_left = function (pressed) {
            if (window.__tvRustFunctions.left) {
              window.__tvRustFunctions.left(pressed);
            }
          };
          importObject.env.mq_handle_right = function (pressed) {
            if (window.__tvRustFunctions.right) {
              window.__tvRustFunctions.right(pressed);
            }
          };
          importObject.env.mq_handle_action = function (pressed) {
            if (window.__tvRustFunctions.action) {
              window.__tvRustFunctions.action(pressed);
            }
          };
          importObject.env.mq_handle_back = function (pressed) {
            if (window.__tvRustFunctions.back) {
              window.__tvRustFunctions.back(pressed);
            }
          };

          console.log("[Glider] TV input handlers registered");
        },
      };

      // Intercept WebAssembly.instantiateStreaming to capture the exports
      var originalInstantiateStreaming = WebAssembly.instantiateStreaming;
      WebAssembly.instantiateStreaming = function (response, imports) {
        console.log(
          "[Glider] Intercepting WebAssembly.instantiateStreaming..."
        );
        var promise = originalInstantiateStreaming.call(
          this,
          response,
          imports
        );
        return promise.then(function (result) {
          console.log("[Glider] WASM instantiateStreaming completed");

          // Handle different result structures
          var instance = null;
          if (result && result.instance) {
            instance = result.instance;
          } else if (result && result.module && result.module.exports) {
            instance = result.module;
          } else if (result && result.exports) {
            instance = result;
          }

          if (!instance || !instance.exports) {
            console.warn(
              "[Glider] Could not extract exports from instantiateStreaming result:",
              result
            );
            return result;
          }

          var exports = instance.exports;
          console.log(
            "[Glider] Extracting TV input functions from exports..."
          );
          var exportNames = Object.keys(exports);
          console.log(
            "[Glider] WASM exports available: " + JSON.stringify(exportNames)
          );

          // Extract TV input functions from exports
          window.__tvRustFunctions = {
            up: exports.mq_handle_up || null,
            down: exports.mq_handle_down || null,
            left: exports.mq_handle_left || null,
            right: exports.mq_handle_right || null,
            action: exports.mq_handle_action || null,
            back: exports.mq_handle_back || null,
          };

          // Check which functions were found
          var missing = [];
          if (!window.__tvRustFunctions.up) missing.push("up");
          if (!window.__tvRustFunctions.down) missing.push("down");
          if (!window.__tvRustFunctions.left) missing.push("left");
          if (!window.__tvRustFunctions.right) missing.push("right");
          if (!window.__tvRustFunctions.action) missing.push("action");
          if (!window.__tvRustFunctions.back) missing.push("back");

          if (missing.length > 0) {
            console.error(
              "[Glider] Missing Rust functions: " + JSON.stringify(missing)
            );
          } else {
            console.log("[Glider] All TV input functions connected!");

            // Update the window functions to call the actual Rust functions
            window.mq_handle_up = function (pressed) {
              if (window.__tvRustFunctions.up) {
                window.__tvRustFunctions.up(pressed);
              }
            };
            window.mq_handle_down = function (pressed) {
              if (window.__tvRustFunctions.down) {
                window.__tvRustFunctions.down(pressed);
              }
            };
            window.mq_handle_left = function (pressed) {
              if (window.__tvRustFunctions.left) {
                window.__tvRustFunctions.left(pressed);
              }
            };
            window.mq_handle_right = function (pressed) {
              if (window.__tvRustFunctions.right) {
                window.__tvRustFunctions.right(pressed);
              }
            };
            window.mq_handle_action = function (pressed) {
              if (window.__tvRustFunctions.action) {
                window.__tvRustFunctions.action(pressed);
              }
            };
            window.mq_handle_back = function (pressed) {
              if (window.__tvRustFunctions.back) {
                window.__tvRustFunctions.back(pressed);
              }
            };

            console.log(
              "[Glider] Window functions updated to use Rust implementations!"
            );
          }

          return result;
        });
      };

      // Also intercept WebAssembly.instantiate for fallback
      var originalInstantiate = WebAssembly.instantiate;
      WebAssembly.instantiate = function (module, imports) {
        console.log("[Glider] Intercepting WebAssembly.instantiate...");
        var promise = originalInstantiate.call(this, module, imports);
        return promise.then(function (result) {
          console.log("[Glider] WASM instantiate completed");

          var instance = null;
          if (result && result.instance) {
            instance = result.instance;
          } else if (result && result.module && result.module.exports) {
            instance = result.module;
          } else if (result && result.exports) {
            instance = result;
          }

          if (!instance || !instance.exports) {
            console.warn(
              "[Glider] Could not extract exports from instantiate result:",
              result
            );
            return result;
          }

          var exports = instance.exports;
          console.log(
            "[Glider] Extracting TV input functions from exports..."
          );
          var exportNames = Object.keys(exports);
          console.log(
            "[Glider] WASM exports available: " + JSON.stringify(exportNames)
          );

          window.__tvRustFunctions = {
            up: exports.mq_handle_up || null,
            down: exports.mq_handle_down || null,
            left: exports.mq_handle_left || null,
            right: exports.mq_handle_right || null,
            action: exports.mq_handle_action || null,
            back: exports.mq_handle_back || null,
          };

          var missing = [];
          if (!window.__tvRustFunctions.up) missing.push("up");
          if (!window.__tvRustFunctions.down) missing.push("down");
          if (!window.__tvRustFunctions.left) missing.push("left");
          if (!window.__tvRustFunctions.right) missing.push("right");
          if (!window.__tvRustFunctions.action) missing.push("action");
          if (!window.__tvRustFunctions.back) missing.push("back");

          if (missing.length > 0) {
            console.error(
              "[Glider] Missing Rust functions: " + JSON.stringify(missing)
            );
          } else {
            console.log("[Glider] All TV input functions connected!");

            window.mq_handle_up = function (pressed) {
              if (window.__tvRustFunctions.up) {
                window.__tvRustFunctions.up(pressed);
              }
            };
            window.mq_handle_down = function (pressed) {
              if (window.__tvRustFunctions.down) {
                window.__tvRustFunctions.down(pressed);
              }
            };
            window.mq_handle_left = function (pressed) {
              if (window.__tvRustFunctions.left) {
                window.__tvRustFunctions.left(pressed);
              }
            };
            window.mq_handle_right = function (pressed) {
              if (window.__tvRustFunctions.right) {
                window.__tvRustFunctions.right(pressed);
              }
            };
            window.mq_handle_action = function (pressed) {
              if (window.__tvRustFunctions.action) {
                window.__tvRustFunctions.action(pressed);
              }
            };
            window.mq_handle_back = function (pressed) {
              if (window.__tvRustFunctions.back) {
                window.__tvRustFunctions.back(pressed);
              }
            };

            console.log(
              "[Glider] Window functions updated to use Rust implementations!"
            );
          }

          return result;
        });
      };

      // Wait for the entire page (and mq_js_bundle.js) to be fully loaded and parsed
      window.addEventListener("load", function () {
        console.log("Page loaded, initializing engine...");

        // Safety check: Did the bundle actually load?
        if (
          typeof miniquad_add_plugin === "undefined" ||
          typeof load === "undefined"
        ) {
          console.error("FATAL: mq_js_bundle.js failed to execute.");
          return;
        }

        // Register plugin and load WASM
        miniquad_add_plugin(GliderPlugin);
        load("glider.wasm");
      });
    </script>
  </body>
</html>
