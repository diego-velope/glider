<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280" />
    <title>Glider - Rust Edition</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        font-family: "Orbitron", monospace;
      }
      #game-wrapper {
        position: relative;
        width: 1280px;
        height: 720px;
      }
      canvas#glcanvas {
        display: block;
        width: 1280px;
        height: 720px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        outline: none;
      }

      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #hud-score {
        position: absolute;
        top: 14px;
        left: 20px;
        font-size: 24px;
        color: #fff;
        text-shadow: 0 0 10px rgba(0, 204, 255, 0.8);
        letter-spacing: 1px;
      }

      #hud-combo {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 22px;
        color: #ffcc44;
        text-shadow: 0 0 12px rgba(255, 204, 68, 0.6);
        letter-spacing: 1px;
      }

      #hud-hi {
        position: absolute;
        top: 14px;
        right: 20px;
        font-size: 20px;
        color: #aef;
        text-shadow: 0 0 10px rgba(170, 238, 255, 0.7);
        letter-spacing: 1px;
      }

      #hud-dist {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 20px;
        color: rgba(200, 240, 255, 0.95);
        text-shadow: 0 0 10px rgba(180, 220, 255, 0.6);
        letter-spacing: 1px;
      }

      /* ── Full Screen UI Overlays ── */
      .screen {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 30;
        pointer-events: none;
        text-align: center;
        background: rgba(0, 0, 0, 0.55);
      }

      #ui-gameover {
        background: rgba(15, 0, 0, 0.7);
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <canvas id="glcanvas" tabindex="1" width="1280" height="720"></canvas>
      <div id="hud">
        <div id="hud-score">Score: 0</div>
        <div id="hud-combo">Combo x1.0</div>
        <div id="hud-hi">Hi: 0</div>
        <div id="hud-dist">Dist: 0</div>
      </div>

      <div id="ui-pause" class="screen">
        <div style="font-size: 64px; color: #ffcc44; text-shadow: 0 0 20px rgba(255, 170, 0, 0.6); margin-bottom: 18px;">
          PAUSED
        </div>
        <div style="font-size: 26px; color: #fff; text-shadow: 0 0 12px rgba(255, 255, 255, 0.35);">
          Press Enter to Resume
        </div>
      </div>

      <div id="ui-gameover" class="screen">
        <div style="font-size: 64px; color: #f44; text-shadow: 0 0 20px rgba(255, 0, 0, 0.35); margin-bottom: 18px;">
          Game Over
        </div>
        <div id="go-score" style="font-size: 36px; color: #ffcc44; text-shadow: 0 0 15px rgba(255, 204, 68, 0.5); margin-bottom: 12px;">
          Score: 0
        </div>
        <div id="go-best" style="font-size: 22px; color: #aef; text-shadow: 0 0 10px rgba(170, 238, 255, 0.5); margin-bottom: 24px;">
          Best: 0
        </div>
        <div style="font-size: 26px; color: #d9d9d9; text-shadow: 0 0 12px rgba(200, 200, 200, 0.35);">
          Press Enter to Restart
        </div>
      </div>
    </div>

    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    <script>
      miniquad_add_plugin({
        register_plugin: function (importObject) {
          importObject.env.js_load_hi = function () {
            return parseInt(localStorage.getItem("glider_hi") || "0");
          };
          importObject.env.js_save_hi = function (s) {
            localStorage.setItem("glider_hi", s.toString());
          };

          importObject.env.js_set_hud = function (score, combo, hi, dist) {
            var e = function (id) {
              return document.getElementById(id);
            };
            if (e("hud-score")) e("hud-score").textContent = "Score: " + score;
            if (e("hud-combo"))
              e("hud-combo").textContent = "Combo x" + combo.toFixed(1);
            if (e("hud-hi")) e("hud-hi").textContent = "Hi: " + hi;
            if (e("hud-dist")) e("hud-dist").textContent = "Dist: " + dist;
          };

          // 1 = playing, 2 = paused, 3 = game over
          // When screen is 3 (game over), score is the final score
          importObject.env.js_set_screen = function (screen, score, hi) {
            var pauseEl = document.getElementById("ui-pause");
            var goEl = document.getElementById("ui-gameover");
            if (pauseEl) pauseEl.style.display = screen === 2 ? "flex" : "none";
            if (goEl) {
              goEl.style.display = screen === 3 ? "flex" : "none";
              if (screen === 3) {
                var scoreEl = document.getElementById("go-score");
                var bestEl = document.getElementById("go-best");
                if (scoreEl) scoreEl.textContent = "Score: " + score;
                if (bestEl) {
                  if (score >= hi && hi > 0) {
                    bestEl.textContent = "New Best!";
                    bestEl.style.color = "#ffcc44";
                  } else {
                    bestEl.textContent = "Best: " + hi;
                    bestEl.style.color = "#aef";
                  }
                }
              }
            }
          };
        },
      });
    </script>

    <script>
      load("glider.wasm");

      // Known miniquad 0.4.x mouse RefCell panic.
      setTimeout(function () {
        var canvas = document.getElementById("glcanvas");
        if (canvas) {
          canvas.onmousemove = null;
          canvas.onmousedown = null;
          canvas.onmouseup = null;
          canvas.onfocus = null;
        }
      }, 800);
    </script>
  </body>
</html>
